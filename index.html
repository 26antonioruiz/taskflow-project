<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consejo del Reino</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>⚔ Consejo del Reino</h1>
        <p>Gestión de misiones en Poniente</p>
    </header>

    <main>

        <aside class="sidebar">
            <h2>Casas</h2>
            <ul>
                <li>🦁 Lannister</li>
                <li>🐺 Stark</li>
                <li>🐉 Targaryen</li>
                <li>🌹 Tyrell</li>
            </ul>
        </aside>

        <section class="tasks">
            <h2>Misiones Activas</h2>

            <div class="task-card high">
                <div class="task-info">
                    <h3>Defender el Muro</h3>
                    <span class="category">Guardia de la Noche</span>
                </div>
                <span class="badge">Alta</span>
            </div>

            <div class="task-card medium">
                <div class="task-info">
                    <h3>Reunión del Consejo</h3>
                    <span class="category">Desembarco del Rey</span>
                </div>
                <span class="badge">Media</span>
            </div>

            <div class="task-card low">
                <div class="task-info">
                    <h3>Entrenar dragones</h3>
                    <span class="category">Rocadragón</span>
                </div>
                <span class="badge">Baja</span>
            </div>

        </section>

    </main>

</body>
</html>
