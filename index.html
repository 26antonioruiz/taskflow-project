<!DOCTYPE html>
<html lang="es">

<head>

	<meta charset="UTF-8">
	<title>Consejo Real de Poniente</title>

	<script src="https://cdn.tailwindcss.com"></script>

	<script>
		tailwind.config = {
			darkMode: 'class'
		}
	</script>

	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

	<style>

		body {
			font-family: 'Cinzel', serif;
		}

		.task {
			transition: .25s;
			cursor: pointer;
		}

		.task:hover {
			transform: scale(1.02);
			box-shadow: 0 0 20px rgba(255, 215, 0, .35);
		}

		.completed {
			opacity: .4;
			text-decoration: line-through;
		}

	</style>

</head>

<body class="bg-gray-100 dark:bg-black text-gray-900 dark:text-gray-100 min-h-screen">


<!-- HEADER -->

<header
	class="relative h-[300px] border-b border-yellow-600 bg-cover bg-center"
	style="background-image:url('img/medieval.jpg')"
>

	<div class="absolute inset-0 bg-black/60"></div>

	<div class="relative text-center pt-24">

		<h1 class="text-4xl font-bold text-yellow-500">
			Consejo Real de Poniente
		</h1>

		<p class="text-gray-300">
			Panel estratégico del Trono de Hierro
		</p>

	</div>

	<button
		id="themeBtn"
		class="absolute right-6 top-6 bg-gray-800 text-yellow-400 px-3 py-2 rounded"
	>
		🌙
	</button>

</header>


<div class="grid grid-cols-12 gap-6 p-6">


	<!-- SIDEBAR -->

	<aside class="col-span-2 bg-white dark:bg-black border border-yellow-600 rounded-xl p-4">

		<h3 class="text-yellow-500 font-bold mb-4">
			Grandes Casas
		</h3>

		<ul class="space-y-4">

			<li onclick="filterHouse('all')" class="cursor-pointer">
				Todas
			</li>

			<li onclick="filterHouse('stark')" class="cursor-pointer">
				🐺 Stark
			</li>

			<li onclick="filterHouse('lannister')" class="cursor-pointer">
				🦁 Lannister
			</li>

			<li onclick="filterHouse('targaryen')" class="cursor-pointer">
				🐉 Targaryen
			</li>

			<li onclick="filterHouse('baratheon')" class="cursor-pointer">
				🦌 Baratheon
			</li>

		</ul>

	</aside>


	<!-- PANEL CENTRAL -->

	<main class="col-span-7 bg-white dark:bg-black border border-yellow-600 rounded-xl p-6">

		<div class="flex justify-between mb-4">

			<h2 class="text-xl font-bold">
				Amenazas del Reino
			</h2>

			<p id="status">
				0 activas · 0 completadas
			</p>

		</div>


		<div class="w-full h-3 bg-gray-300 dark:bg-gray-700 rounded mb-6">

			<div
				id="progress"
				class="h-3 bg-yellow-500 rounded transition-all"
			></div>

		</div>


		<!-- FORMULARIO -->

		<div class="flex gap-3 mb-4">

			<input
				id="taskInput"
				placeholder="Nueva misión..."
				class="flex-1 px-3 py-2 border rounded dark:bg-gray-800"
			>

			<select
				id="houseSelect"
				class="px-2 py-2 border rounded dark:bg-gray-800"
			>

				<option value="stark">Stark</option>
				<option value="lannister">Lannister</option>
				<option value="targaryen">Targaryen</option>
				<option value="baratheon">Baratheon</option>

			</select>

			<select
				id="prioritySelect"
				class="px-2 py-2 border rounded dark:bg-gray-800"
			>

				<option value="alta">Alta</option>
				<option value="media">Media</option>
				<option value="baja">Baja</option>

			</select>

			<button
				onclick="addTask()"
				class="bg-yellow-600 text-black px-4 rounded"
			>
				Añadir
			</button>

		</div>


		<input
			id="search"
			placeholder="Buscar misión..."
			class="w-full px-3 py-2 border rounded mb-6 dark:bg-gray-800"
		>


		<div id="tasks" class="space-y-6"></div>

	</main>


	<!-- PANEL DERECHO -->

	<aside class="col-span-3 bg-white dark:bg-black border border-yellow-600 rounded-xl p-6">

		<h3 class="text-yellow-500 font-bold mb-4">
			Estado del Reino
		</h3>

		<ul id="houseStats" class="mb-6"></ul>

		<h3 class="text-yellow-500 font-bold mb-4">
			Prioridades
		</h3>

		<ul>

			<li>🔥 Alta <span id="altaCount">0</span></li>
			<li>⚔ Media <span id="mediaCount">0</span></li>
			<li>🛡 Baja <span id="bajaCount">0</span></li>

		</ul>

	</aside>

</div>

<script src="app.js"></script>

</body>
</html>
