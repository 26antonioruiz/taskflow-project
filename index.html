<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Tronos - Experiencia Suprema</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
    font-family:'Cinzel',serif;
    background:#0b0b0f;
    color:white;
    overflow-x:hidden;
}

/* HERO */
.hero {
    height:100vh;
    background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    position:relative;
}
.hero h1 {
    font-size:4rem;
    background:linear-gradient(to right,#d4af37,#fff);
    -webkit-background-clip:text;
    color:transparent;
    animation:fadeIn 2s ease;
}
.hero button {
    margin-top:20px;
    padding:15px 40px;
    background:crimson;
    border:none;
    cursor:pointer;
    font-size:1.1rem;
    transition:0.3s;
}
.hero button:hover {transform:scale(1.1);background:darkred;}

/* NIEVE */
.snowflake {
    position:fixed;
    top:-10px;
    color:white;
    font-size:1em;
    animation:fall linear infinite;
}
@keyframes fall {
    to {transform:translateY(110vh);}
}

/* CASAS */
section {padding:80px 20px;text-align:center;}
.cards {display:flex;justify-content:center;gap:30px;flex-wrap:wrap;}
.card {
    background:#111;
    padding:30px;
    border:2px solid gold;
    cursor:pointer;
    transition:0.3s;
}
.card:hover {transform:scale(1.1);background:#222;}

/* RESULTADO CASA */
#house-result {
    margin-top:30px;
    font-size:1.5rem;
}

/* BATALLA */
.battle {
    background:#111;
    padding:40px;
}
.health-bar {
    width:300px;
    height:20px;
    background:#333;
    margin:10px auto;
}
.health {
    height:100%;
    background:red;
    width:100%;
}
.battle button {
    padding:10px 20px;
    margin-top:10px;
    background:gold;
    border:none;
    cursor:pointer;
}

/* FUEGO */
.fire {
    position:fixed;
    bottom:0;
    width:100%;
    height:100px;
    background:radial-gradient(circle at 50% 100%, orange, red, transparent);
    animation:fireAnim 1s infinite alternate;
}
@keyframes fireAnim {
    from {opacity:0.7;}
    to {opacity:1;}
}

/* MÚSICA BOTÓN */
.music-btn {
    position:fixed;
    top:20px;
    right:20px;
    background:gold;
    padding:10px;
    cursor:pointer;
}

@keyframes fadeIn {
    from {opacity:0;transform:translateY(30px);}
    to {opacity:1;transform:translateY(0);}
}

</style>
</head>
<body>

<div class="music-btn" onclick="toggleMusic()">🎵 Música</div>

<!-- HERO -->
<section class="hero">
    <h1>El Invierno Ha Llegado</h1>
    <button onclick="scrollToSection('houses')">Comenzar</button>
</section>

<!-- CASAS -->
<section id="houses">
    <h2>Elige Tu Casa</h2>
    <div class="cards">
        <div class="card" onclick="chooseHouse('Stark')">🐺 Casa Stark</div>
        <div class="card" onclick="chooseHouse('Lannister')">🦁 Casa Lannister</div>
        <div class="card" onclick="chooseHouse('Targaryen')">🔥 Casa Targaryen</div>
    </div>
    <div id="house-result"></div>
</section>

<!-- BATALLA -->
<section class="battle">
    <h2>⚔️ Batalla por el Trono</h2>
    <p>Vida del enemigo:</p>
    <div class="health-bar">
        <div id="enemyHealth" class="health"></div>
    </div>
    <button onclick="attack()">Atacar</button>
    <p id="battle-result"></p>
</section>

<div class="fire"></div>

<audio id="bg-music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3e60c3f99b.mp3?filename=epic-cinematic-11309.mp3" type="audio/mpeg">
</audio>

<script>

/* SCROLL */
function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* NIEVE */
for(let i=0;i<50;i++){
    let snow=document.createElement("div");
    snow.classList.add("snowflake");
    snow.innerText="❄";
    snow.style.left=Math.random()*100+"vw";
    snow.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(snow);
}

/* MÚSICA */
let music=document.getElementById("bg-music");
function toggleMusic(){
    if(music.paused) music.play();
    else music.pause();
}

/* ELECCIÓN CASA */
function chooseHouse(house){
    let result=document.getElementById("house-result");
    result.innerHTML="Has elegido la Casa "+house+" 🏰<br>Tu destino cambiará el curso de los Siete Reinos.";
}

/* BATALLA */
let enemyHP=100;
function attack(){
    let damage=Math.floor(Math.random()*20)+5;
    enemyHP-=damage;
    if(enemyHP<0) enemyHP=0;
    document.getElementById("enemyHealth").style.width=enemyHP+"%";
    if(enemyHP===0){
        document.getElementById("battle-result").innerText="🔥 ¡Has conquistado el Trono de Hierro!";
    }
}

</script>

</body>
</html>
