<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Juego de Tronos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --stark:#7f8c8d;
    --lannister:#c0392b;
    --targaryen:#e67e22;
    --background:#0b0b0f;
    --sidebar-bg:#111;
    --main-bg:#1a1a1a;
    --text-color:#fff;
    --badge-high:#e74c3c;
    --badge-medium:#f1c40f;
    --badge-low:#2ecc71;
    --transition:0.3s;
}

/* Reset */
* { box-sizing:border-box; margin:0; padding:0; font-family:'Cinzel', serif; }
body { display:flex; min-height:100vh; background:var(--background); color:var(--text-color); transition:background var(--transition); }

/* Sidebar */
aside {
    width:250px;
    background:var(--sidebar-bg);
    padding:20px;
    transition:var(--transition);
}
aside h2 { margin-bottom:20px; }
aside ul { list-style:none; }
aside li { padding:10px; cursor:pointer; margin-bottom:10px; border-radius:5px; transition:var(--transition); }
aside li:hover { background:#222; }
aside li.active { font-weight:bold; border-left:4px solid gold; }

/* Hamburger */
#hamburger { display:none; cursor:pointer; margin-bottom:20px; }
#hamburger div { width:30px; height:4px; background:white; margin:6px 0; transition:0.3s; }

/* Main */
.main-container { flex:1; padding:20px; background:var(--main-bg); transition:var(--transition); }
h1 { margin-bottom:20px; }

/* Tasks */
.task { 
    background:#222; padding:15px; margin-bottom:15px; border-radius:8px; 
    display:flex; justify-content:space-between; align-items:center; 
    transition:background var(--transition), transform var(--transition); 
}
.task:hover { transform:scale(1.02); }
.task.completed { background:#555; text-decoration:line-through; opacity:0.8; }

/* Badges */
.badge { padding:5px 10px; border-radius:12px; font-size:0.8rem; font-weight:bold; color:#111; }
.high { background:var(--badge-high); }
.medium { background:var(--badge-medium); }
.low { background:var(--badge-low); }

/* Responsive */
@media(max-width:768px){
    body { flex-direction:column; }
    aside { width:100%; display:none; }
    #hamburger { display:block; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
    <h2>Casas</h2>
    <ul>
        <li class="active" onclick="filterTasks('Stark')" style="border-left-color: var(--stark)">Stark</li>
        <li onclick="filterTasks('Lannister')" style="border-left-color: var(--lannister)">Lannister</li>
        <li onclick="filterTasks('Targaryen')" style="border-left-color: var(--targaryen)">Targaryen</li>
    </ul>
</aside>

<!-- Hamburger -->
<div id="hamburger" onclick="toggleSidebar()">
    <div></div><div></div><div></div>
</div>

<!-- Main -->
<div class="main-container">
    <h1>Misiones</h1>
    <div id="tasks"></div>
</div>

<script>
// Datos iniciales de tareas
let tasksData = [
    {house:'Stark', text:'Patrullar el Norte', priority:'high', completed:false},
    {house:'Lannister', text:'Recoger impuestos en Desembarco del Rey', priority:'medium', completed:false},
    {house:'Targaryen', text:'Entrenar dragones jóvenes', priority:'high', completed:false},
    {house:'Stark', text:'Reparar muros de Winterfell', priority:'low', completed:false},
    {house:'Lannister', text:'Organizar banquete real', priority:'medium', completed:false},
];

// Guardar / cargar localStorage
if(localStorage.getItem('tasks')) tasksData = JSON.parse(localStorage.getItem('tasks'));

function saveTasks(){ localStorage.setItem('tasks', JSON.stringify(tasksData)); }

// Renderizado de tareas
function renderTasks(filterHouse='Stark'){
    const container = document.getElementById('tasks');
    container.innerHTML='';
    tasksData.forEach((task,index)=>{
        if(task.house===filterHouse){
            const section = document.createElement('section');
            section.className='task';
            if(task.completed) section.classList.add('completed');
            section.dataset.index=index;
            section.innerHTML=`<span>${task.text}</span><span class="badge ${task.priority}">${task.priority.toUpperCase()}</span>`;
            section.draggable=true;
            section.addEventListener('click', ()=>toggleComplete(index));
            section.addEventListener('dragstart', dragStart);
            section.addEventListener('dragover', dragOver);
            section.addEventListener('drop', drop);
            container.appendChild(section);
        }
    });
}

// Toggle completado
function toggleComplete(i){ tasksData[i].completed=!tasksData[i].completed; saveTasks(); renderTasks(currentHouse); }

// Filtrar
let currentHouse='Stark';
function filterTasks(house){ currentHouse=house; renderTasks(house); 
    document.querySelectorAll('aside li').forEach(i=>i.classList.remove('active'));
    event.target.classList.add('active');
}

// Drag & Drop
let draggedIndex=null;
function dragStart(e){ draggedIndex=e.target.dataset.index; }
function dragOver(e){ e.preventDefault(); }
function drop(e){ 
    e.preventDefault();
    const targetIndex = e.target.closest('.task').dataset.index;
    const temp = tasksData[draggedIndex];
    tasksData.splice(draggedIndex,1);
    tasksData.splice(targetIndex,0,temp);
    saveTasks();
    renderTasks(currentHouse);
}

// Toggle sidebar mobile
function toggleSidebar(){
    const sidebar=document.getElementById('sidebar');
    if(sidebar.style.display==='block') sidebar.style.display='none';
    else sidebar.style.display='block';
}

// Inicial render
renderTasks(currentHouse);
</script>

</body>
</html>
