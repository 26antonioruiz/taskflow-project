<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Tronos - Mini Juego</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Juego de Tronos - Mini Juego</h1>
        <p>Elige tu casa y enfrenta otras casas en batalla</p>
    </header>

    <main>
        <aside id="houses">
            <h2>Elige tu Casa</h2>
            <button onclick="chooseHouse('Stark')">Stark</button>
            <button onclick="chooseHouse('Lannister')">Lannister</button>
            <button onclick="chooseHouse('Targaryen')">Targaryen</button>
        </aside>

        <section id="characters">
            <h2>Personajes</h2>
            <div id="house-logo"></div>
            <div id="character-info">
                <p>Selecciona una casa para ver sus personajes</p>
            </div>
        </section>

        <section id="battle">
            <h2>Batalla</h2>
            <button onclick="startBattle()">Iniciar Batalla</button>
            <div id="battle-result"></div>
        </section>
    </main>

    <div id="effects"></div>

    <script src="js/script.js"></script>
</body>
</html>
